[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.default]
alias = "verify"

[tasks.fmt-workspace]
description = "Format workspace Rust source files"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-zed]
description = "Format the excluded Zed extension crate"
command = "cargo"
args = ["fmt", "--manifest-path", "editors/zed/Cargo.toml"]

[tasks.fmt]
description = "Format workspace and Zed extension Rust source files"
dependencies = ["fmt-workspace", "fmt-zed"]

[tasks.format]
description = "Alias for fmt"
alias = "fmt"

[tasks.fmt-check-workspace]
description = "Check workspace Rust formatting without changing files"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt-check-zed]
description = "Check Zed extension formatting without changing files"
command = "cargo"
args = [
  "fmt",
  "--manifest-path",
  "editors/zed/Cargo.toml",
  "--",
  "--check",
]

[tasks.fmt-check]
description = "Check all Rust formatting without changing files"
dependencies = ["fmt-check-workspace", "fmt-check-zed"]

[tasks.format-check]
description = "Alias for fmt-check"
alias = "fmt-check"

[tasks.check]
description = "Type-check all workspace targets and features"
command = "cargo"
args = ["check", "--workspace", "--all-targets", "--all-features"]

[tasks.clippy]
description = "Run Clippy for all workspace targets and features"
command = "cargo"
args = [
  "clippy",
  "--workspace",
  "--all-targets",
  "--all-features",
  "--",
  "-D",
  "warnings",
]

[tasks.test]
description = "Run all workspace tests"
command = "cargo"
args = ["test", "--workspace", "--all-features"]

[tasks.test-core]
description = "Run parser, renderer, lint, and formatter tests"
command = "cargo"
args = ["test", "-p", "adocweave", "--all-features"]

[tasks.test-cli]
description = "Run command-line adapter tests"
command = "cargo"
args = ["test", "-p", "adocweave-cli", "--all-features"]

[tasks.test-lsp]
description = "Run Language Server tests"
command = "cargo"
args = ["test", "-p", "adocweave-lsp", "--all-features"]

[tasks.test-wasm-api]
description = "Run the native WASM API contract tests"
command = "cargo"
args = ["test", "-p", "adocweave-wasm", "--all-features"]

[tasks.test-web-worker]
description = "Run the Web Worker protocol tests"
command = "npm"
args = ["test", "--prefix", "web-worker"]

[tasks.release-contract]
description = "Verify release train versions, targets, tags, and distribution manifest schema"
dependencies = ["release-metadata-test", "release-workflow-policy"]
script_runner = "@shell"
script = '''
args=""
metadata="$(mktemp "${TMPDIR:-/tmp}/adocweave-release-metadata.XXXXXX.json")"
trap 'rm -f "$metadata"' EXIT
if [ -n "${RELEASE_TAG:-}" ]; then
  args="--tag=$RELEASE_TAG"
fi
node tools/release-contract.mjs $args
node tools/release-contract.test.mjs
cargo metadata --no-deps --format-version=1 > "$metadata"
node tools/verify-cargo-release-metadata.mjs "$metadata"
node tools/verify-third-party-notices.mjs "$metadata"
'''

[tasks.release-metadata-test]
description = "Test canonical release manifest, SPDX SBOM, and checksum generation"
command = "node"
args = ["--test", "tools/release-metadata.test.mjs"]

[tasks.release-workflow-policy]
description = "Test action pins, release permissions, fork isolation, and transactional publication policy"
script_runner = "@shell"
script = '''
node tools/release-workflow-policy.mjs
node --test tools/release-workflow-policy.test.mjs
'''

[tasks.workflow-lint]
description = "Lint GitHub Actions syntax and enforce the release security policy"
dependencies = ["release-workflow-policy"]
command = "actionlint"

[tasks.release-ci-contract]
description = "Run the release contract, workflow lint, and cargo-dist plan used by pull requests"
dependencies = ["release-contract", "workflow-lint", "dist-plan"]

[tasks.dev-tools-check]
description = "Verify that the flake development shell exposes every repository tool entry point"
script_runner = "@shell"
script = '''
missing=0
for tool in actionlint adocweave-fuzz cargo cargo-make cargo-clippy chromium dist esbuild fc-list gh git jq node npm rg rustc rustfmt sha256sum tar tsc wasm-bindgen xz; do
  if ! command -v "$tool" >/dev/null 2>&1; then
    echo "missing development tool: $tool" >&2
    missing=1
  fi
done
exit "$missing"
'''

[tasks.flake-check]
description = "Evaluate the Nix flake without building every output"
command = "nix"
args = ["flake", "check", "--no-build"]

[tasks.native-release-smoke]
description = "Smoke test extracted CLI and LSP release archives for NATIVE_TARGET"
script_runner = "@shell"
script = '''
if [ -z "${NATIVE_TARGET:-}" ] || [ -z "${NATIVE_ARTIFACT_DIR:-}" ]; then
  echo "NATIVE_TARGET and NATIVE_ARTIFACT_DIR are required" >&2
  exit 2
fi
node tools/native-release-smoke.mjs "$NATIVE_ARTIFACT_DIR" "$NATIVE_TARGET"
'''

[tasks.native-release-smoke-host]
description = "Exercise archive and binary smoke logic with local host binaries"
dependencies = ["build"]
script_runner = "@shell"
script = '''
root="target/native-smoke-host"
artifacts="$root/artifacts"
rm -rf "$root"
mkdir -p "$artifacts"
for package in adocweave-cli adocweave-lsp; do
  case "$package" in
    adocweave-cli) executable="adocweave" ;;
    adocweave-lsp) executable="adocweave-lsp" ;;
  esac
  archive_root="$package-x86_64-unknown-linux-musl"
  stage="$root/$archive_root"
  mkdir -p "$stage"
  cp "target/debug/$executable" "$stage/$executable"
  cp README.adoc LICENSE-MIT LICENSE-APACHE THIRD_PARTY_NOTICES.adoc "$stage/"
  tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
    -cJf "$artifacts/$archive_root.tar.xz" -C "$root" "$archive_root"
done
ADOCWEAVE_SMOKE_ALLOW_DYNAMIC=1 \
  node tools/native-release-smoke.mjs "$artifacts" x86_64-unknown-linux-musl
'''

[tasks.dist-plan]
description = "Run the pinned dist release plan without publishing"
script_runner = "@shell"
script = '''
version="$(node --input-type=module -e "import manifest from './release-manifest.json' with { type: 'json' }; process.stdout.write(manifest.packageVersion)")"
plan="$(mktemp "${TMPDIR:-/tmp}/adocweave-dist-plan.XXXXXX.json")"
trap 'rm -f "$plan"' EXIT
dist plan --tag="v$version" --output-format=json > "$plan"
node tools/verify-dist-plan.mjs "$plan" "v$version"
'''

[tasks.check-wasm]
description = "Type-check the WASM adapter for wasm32-unknown-unknown"
command = "cargo"
args = [
  "check",
  "-p",
  "adocweave-wasm",
  "--target",
  "wasm32-unknown-unknown",
]

[tasks.build-wasm]
description = "Build wasm-bindgen web artifacts under target/adocweave-wasm"
script_runner = "@shell"
script = '''
export RUSTFLAGS="${RUSTFLAGS:-} --remap-path-prefix=$(pwd)=. --remap-path-prefix=${CARGO_HOME:-$HOME/.cargo}=cargo-home"
cargo build -p adocweave-wasm --release --target wasm32-unknown-unknown
wasm-bindgen \
  --target web \
  --out-dir target/adocweave-wasm \
  target/wasm32-unknown-unknown/release/adocweave_wasm.wasm
'''

[tasks.package-browser-release]
description = "Build the deterministic browser extra artifact consumed by dist"
command = "bash"
args = ["tools/package-browser-release.sh"]

[tasks.test-browser-release-package]
description = "Verify browser release archive layout and deterministic bytes"
dependencies = ["package-browser-release"]
script_runner = "@shell"
script = '''
version="$(node --input-type=module -e "import manifest from './release-manifest.json' with { type: 'json' }; process.stdout.write(manifest.packageVersion)")"
package="adocweave-browser-$version"
archive="target/distrib/adocweave-browser-$version.tar.xz"
first="$(sha256sum "$archive" | cut -d ' ' -f 1)"
cargo make package-browser-release >/dev/null
second="$(sha256sum "$archive" | cut -d ' ' -f 1)"
if [ "$first" != "$second" ]; then
  echo "browser release archive is not deterministic" >&2
  exit 1
fi

actual="$(mktemp "${TMPDIR:-/tmp}/adocweave-browser-archive.XXXXXX.list")"
expected="$(mktemp "${TMPDIR:-/tmp}/adocweave-browser-archive-expected.XXXXXX.list")"
trap 'rm -f "$actual" "$expected"' EXIT
tar -tJf "$archive" | LC_ALL=C sort > "$actual"
printf '%s\n' \
  "$package/" \
  "$package/LICENSE-APACHE" \
  "$package/LICENSE-MIT" \
  "$package/README.adoc" \
  "$package/THIRD_PARTY_NOTICES.adoc" \
  "$package/package.json" \
  "$package/example/" \
  "$package/example/app.mjs" \
  "$package/example/index.html" \
  "$package/wasm/" \
  "$package/wasm/adocweave_wasm.d.ts" \
  "$package/wasm/adocweave_wasm.js" \
  "$package/wasm/adocweave_wasm_bg.wasm" \
  "$package/worker/" \
  "$package/worker/client.mjs" \
  "$package/worker/contracts.mjs" \
  "$package/worker/controller.mjs" \
  "$package/worker/index.d.mts" \
  "$package/worker/index.mjs" \
  "$package/worker/worker.mjs" | LC_ALL=C sort > "$expected"
diff -u "$expected" "$actual"
echo "browser release package verified: $second"
'''

[tasks.test-browser-types]
description = "Compile-check the public browser TypeScript declarations"
command = "tsc"
args = ["--project", "web-worker/tsconfig.json"]

[tasks.test-browser-smoke]
description = "Run the extracted browser archive in isolated and fallback Chromium contexts"
dependencies = ["package-browser-release", "test-browser-types"]
script_runner = "@shell"
script = '''
version="$(node --input-type=module -e "import manifest from './release-manifest.json' with { type: 'json' }; process.stdout.write(manifest.packageVersion)")"
node tools/browser-release-smoke.mjs "target/distrib/adocweave-browser-$version.tar.xz"
'''

[tasks.test-browser-bundler]
description = "Bundle the public browser API with esbuild and smoke test its asset URL resolution"
dependencies = ["package-browser-release", "test-browser-types"]
script_runner = "@shell"
script = '''
version="$(node --input-type=module -e "import manifest from './release-manifest.json' with { type: 'json' }; process.stdout.write(manifest.packageVersion)")"
package="adocweave-browser-$version"
source_archive="target/distrib/$package.tar.xz"
root="$(mktemp -d "${TMPDIR:-/tmp}/adocweave-browser-bundler.XXXXXX")"
archive="$root/$package-bundled.tar.xz"
trap 'rm -rf "$root"' EXIT
tar -xJf "$source_archive" -C "$root"
esbuild web-worker/bundler-entry.mjs \
  --bundle --format=esm --platform=browser \
  --outfile="$root/$package/example/app.mjs"
tar --sort=name --mtime='@0' --owner=0 --group=0 --numeric-owner \
  -cJf "$archive" -C "$root" "$package"
node tools/browser-release-smoke.mjs "$archive"
'''

[tasks.build-wasm-node]
description = "Build wasm-bindgen Node.js artifacts for cross-runtime conformance"
script_runner = "@shell"
script = '''
export RUSTFLAGS="${RUSTFLAGS:-} --remap-path-prefix=$(pwd)=. --remap-path-prefix=${CARGO_HOME:-$HOME/.cargo}=cargo-home"
cargo build -p adocweave-wasm --release --target wasm32-unknown-unknown
wasm-bindgen \
  --target nodejs \
  --out-dir target/adocweave-wasm-node \
  target/wasm32-unknown-unknown/release/adocweave_wasm.wasm
'''

[tasks.build-conformance-native]
description = "Build the native JSON conformance adapter"
command = "cargo"
args = ["build", "-p", "adocweave-wasm", "--bin", "adocweave-conformance-native"]

[tasks.test-cross-runtime]
description = "Compare native and actual WASM results over shared conformance fixtures"
dependencies = ["build-conformance-native", "build-wasm-node"]
command = "npm"
args = ["run", "test:cross-runtime", "--prefix", "web-worker"]

[tasks.wasm-size]
description = "Build WASM and report generated artifact byte sizes"
dependencies = ["build-wasm"]
script_runner = "@shell"
script = '''
for artifact in target/adocweave-wasm/*; do
  bytes="$(wc -c < "$artifact")"
  echo "$bytes $artifact"
done
'''

[tasks.test-grammar]
description = "Run normative grammar and substitution contract tests"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "grammar"]

[tasks.test-properties]
description = "Run deterministic parser, renderer, position, and formatter properties"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "properties"]

[tasks.test-security]
description = "Run adversarial input, resource limit, and cancellation regressions"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "security"]

[tasks.fuzz-check]
description = "Compile every cargo-fuzz target without running it"
command = "adocweave-fuzz"
args = ["check", "--fuzz-dir", "fuzz"]

[tasks.fuzz-smoke]
description = "Run deterministic short fuzz smoke tests (set FUZZ_SECONDS to override)"
script_runner = "@shell"
script = '''
seconds="${FUZZ_SECONDS:-5}"
smoke_root="$(mktemp -d "${TMPDIR:-/tmp}/adocweave-fuzz-smoke.XXXXXX")"
trap 'rm -rf "$smoke_root"' EXIT
for target in analyze process render; do
  corpus="$smoke_root/$target"
  log="$smoke_root/$target.log"
  mkdir -p "$corpus"
  cp -R "fuzz/corpus/$target/." "$corpus/"
  # LeakSanitizer cannot enumerate threads under some sandbox/ptrace hosts.
  # Address/undefined-behavior instrumentation remains enabled.
  if ! ASAN_OPTIONS="${ASAN_OPTIONS:-detect_leaks=0}" \
    adocweave-fuzz run --fuzz-dir fuzz "$target" "$corpus" -- \
    -seed=1 -max_total_time="$seconds" -timeout=2 -verbosity=0 >"$log" 2>&1; then
    cat "$log" >&2
    exit 1
  fi
  echo "fuzz smoke passed: $target (${seconds}s)"
done
'''

[tasks.test-release-core]
private = true
command = "cargo"
args = ["test", "-p", "adocweave-cli", "--test", "cli", "release_fixture"]

[tasks.test-release-lsp]
private = true
command = "cargo"
args = ["test", "-p", "adocweave-lsp", "release_fixture"]

[tasks.test-release]
description = "Run the cross-component initial release fixture tests"
dependencies = ["test-release-core", "test-release-lsp"]

[tasks.test-profile-release]
description = "Run versioned core-profile and cross-runtime release contracts"
dependencies = ["test-release", "test-cross-runtime"]
command = "cargo"
args = ["test", "-p", "adocweave-wasm", "--test", "conformance"]

[tasks.check-zed]
description = "Type-check the excluded Zed extension crate"
command = "cargo"
args = ["check", "--manifest-path", "editors/zed/Cargo.toml"]

[tasks.clippy-zed]
description = "Run Clippy for the excluded Zed extension crate"
command = "cargo"
args = [
  "clippy",
  "--manifest-path",
  "editors/zed/Cargo.toml",
  "--",
  "-D",
  "warnings",
]

[tasks.run-lsp]
description = "Run the Language Server over standard input/output"
command = "cargo"
args = ["run", "-p", "adocweave-lsp", "--bin", "adocweave-lsp"]

[tasks.doc-check]
description = "Build workspace API documentation without dependencies"
env = { "RUSTDOCFLAGS" = "-D warnings" }
command = "cargo"
args = ["doc", "--workspace", "--all-features", "--no-deps"]

[tasks.docs-check]
description = "Reject .md files"
script_runner = "@shell"
script = '''
unexpected="$(rg --files --hidden -g '*.md' -g '!.git/**' || true)"
if [ -n "$unexpected" ]; then
  echo "repository documentation must use .adoc:" >&2
  echo "$unexpected" >&2
  exit 1
fi
'''

[tasks.build-adoc-check]
private = true
command = "cargo"
args = ["build", "-p", "adocweave-cli", "--bin", "adocweave"]

[tasks.adoc-check]
description = "Check every tracked AsciiDoc file for crashes, losslessness, and valid ranges"
dependencies = ["build-adoc-check", "adoc-invariants"]
script_runner = "@shell"
script = '''
manifest="$(mktemp "${TMPDIR:-/tmp}/adocweave-adoc-check.XXXXXX")"
trap 'rm -f "$manifest"' EXIT
git ls-files '*.adoc' | LC_ALL=C sort > "$manifest"
diagnostics_log="target/adoc-check-diagnostics.log"
: > "$diagnostics_log"

documents=0
diagnostics=0
failed=0
while IFS= read -r path; do
  documents=$((documents + 1))
  if output="$(target/debug/adocweave check "$path" 2>&1)"; then
    if [ -n "$output" ]; then
      echo "[$path]" >> "$diagnostics_log"
      echo "$output" >> "$diagnostics_log"
      count="$(printf '%s\n' "$output" | wc -l)"
      diagnostics=$((diagnostics + count))
    fi
  else
    echo "[$path]" >&2
    echo "$output" >&2
    failed=1
  fi
done < "$manifest"

if [ "$failed" -ne 0 ]; then
  echo "adoc-check failed: $documents documents" >&2
  exit 1
fi
echo "adoc-check passed: $documents documents, $diagnostics permissive diagnostics recorded in $diagnostics_log"
'''

[tasks.adoc-invariants]
private = true
command = "cargo"
args = [
  "test",
  "-p",
  "adocweave",
  "--test",
  "repository_governance",
  "tracked_adoc_corpus_is_lossless_and_has_valid_ranges",
]

[tasks.docs-lint]
description = "Reject unexpected diagnostics in normative documents and abnormal fixtures"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "repository_governance"]

[tasks.build]
description = "Build all workspace targets and features"
command = "cargo"
args = ["build", "--workspace", "--all-targets", "--all-features"]

[tasks.verify]
description = "Run every non-mutating validation task"
dependencies = [
  "fmt-check",
  "check",
  "check-wasm",
  "check-zed",
  "clippy",
  "clippy-zed",
  "test",
  "test-web-worker",
  "release-contract",
  "workflow-lint",
  "test-cross-runtime",
  "doc-check",
  "docs-check",
  "adoc-check",
  "docs-lint",
  "build",
]

[tasks.ci]
description = "Run the complete gate plus fuzz target compilation and short exploration"
dependencies = ["verify", "fuzz-check", "fuzz-smoke"]

[tasks.release-check]
description = "Run the publish gate and report release WASM artifact sizes"
dependencies = [
  "ci",
  "test-profile-release",
  "wasm-size",
  "test-browser-release-package",
  "test-browser-smoke",
  "test-browser-bundler",
  "native-release-smoke-host",
  "dist-plan",
]

[tasks.release-gate]
description = "Canonical alias for the complete publish gate"
alias = "release-check"
