[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.default]
alias = "verify"

[tasks.fmt-workspace]
description = "Format workspace Rust source files"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-zed]
description = "Format the excluded Zed extension crate"
command = "cargo"
args = ["fmt", "--manifest-path", "editors/zed/Cargo.toml"]

[tasks.fmt]
description = "Format workspace and Zed extension Rust source files"
dependencies = ["fmt-workspace", "fmt-zed"]

[tasks.format]
description = "Alias for fmt"
alias = "fmt"

[tasks.fmt-check-workspace]
description = "Check workspace Rust formatting without changing files"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt-check-zed]
description = "Check Zed extension formatting without changing files"
command = "cargo"
args = [
  "fmt",
  "--manifest-path",
  "editors/zed/Cargo.toml",
  "--",
  "--check",
]

[tasks.fmt-check]
description = "Check all Rust formatting without changing files"
dependencies = ["fmt-check-workspace", "fmt-check-zed"]

[tasks.format-check]
description = "Alias for fmt-check"
alias = "fmt-check"

[tasks.check]
description = "Type-check all workspace targets and features"
command = "cargo"
args = ["check", "--workspace", "--all-targets", "--all-features"]

[tasks.clippy]
description = "Run Clippy for all workspace targets and features"
command = "cargo"
args = [
  "clippy",
  "--workspace",
  "--all-targets",
  "--all-features",
  "--",
  "-D",
  "warnings",
]

[tasks.test]
description = "Run all workspace tests"
command = "cargo"
args = ["test", "--workspace", "--all-features"]

[tasks.test-core]
description = "Run parser, renderer, lint, formatter, and CLI tests"
command = "cargo"
args = ["test", "-p", "adocweave", "--all-features"]

[tasks.test-lsp]
description = "Run Language Server tests"
command = "cargo"
args = ["test", "-p", "adocweave-lsp", "--all-features"]

[tasks.test-wasm-api]
description = "Run the native WASM API contract tests"
command = "cargo"
args = ["test", "-p", "adocweave-wasm", "--all-features"]

[tasks.test-web-worker]
description = "Run the Web Worker protocol tests"
command = "npm"
args = ["test", "--prefix", "web-worker"]

[tasks.check-wasm]
description = "Type-check the WASM adapter for wasm32-unknown-unknown"
command = "cargo"
args = [
  "check",
  "-p",
  "adocweave-wasm",
  "--target",
  "wasm32-unknown-unknown",
]

[tasks.build-wasm]
description = "Build wasm-bindgen web artifacts under target/adocweave-wasm"
script_runner = "@shell"
script = '''
cargo build -p adocweave-wasm --release --target wasm32-unknown-unknown
wasm-bindgen \
  --target web \
  --out-dir target/adocweave-wasm \
  target/wasm32-unknown-unknown/release/adocweave_wasm.wasm
'''

[tasks.build-wasm-node]
description = "Build wasm-bindgen Node.js artifacts for cross-runtime conformance"
script_runner = "@shell"
script = '''
cargo build -p adocweave-wasm --release --target wasm32-unknown-unknown
wasm-bindgen \
  --target nodejs \
  --out-dir target/adocweave-wasm-node \
  target/wasm32-unknown-unknown/release/adocweave_wasm.wasm
'''

[tasks.build-conformance-native]
description = "Build the native JSON conformance adapter"
command = "cargo"
args = ["build", "-p", "adocweave-wasm", "--bin", "adocweave-conformance-native"]

[tasks.test-cross-runtime]
description = "Compare native and actual WASM results over shared conformance fixtures"
dependencies = ["build-conformance-native", "build-wasm-node"]
command = "npm"
args = ["run", "test:cross-runtime", "--prefix", "web-worker"]

[tasks.wasm-size]
description = "Build WASM and report generated artifact byte sizes"
dependencies = ["build-wasm"]
script_runner = "@shell"
script = '''
for artifact in target/adocweave-wasm/*; do
  bytes="$(wc -c < "$artifact")"
  echo "$bytes $artifact"
done
'''

[tasks.test-grammar]
description = "Run normative grammar and substitution contract tests"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "grammar"]

[tasks.test-properties]
description = "Run deterministic parser, renderer, position, and formatter properties"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "properties"]

[tasks.test-security]
description = "Run adversarial input, resource limit, and cancellation regressions"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "security"]

[tasks.fuzz-check]
description = "Compile every cargo-fuzz target without running it"
command = "adocweave-fuzz"
args = ["check", "--fuzz-dir", "fuzz"]

[tasks.fuzz-smoke]
description = "Run deterministic short fuzz smoke tests (set FUZZ_SECONDS to override)"
script_runner = "@shell"
script = '''
seconds="${FUZZ_SECONDS:-5}"
smoke_root="$(mktemp -d target/adocweave-fuzz-smoke.XXXXXX)"
trap 'rm -rf "$smoke_root"' EXIT
for target in analyze process render; do
  corpus="$smoke_root/$target"
  log="$smoke_root/$target.log"
  mkdir -p "$corpus"
  cp -R "fuzz/corpus/$target/." "$corpus/"
  if ! adocweave-fuzz run --fuzz-dir fuzz "$target" "$corpus" -- \
    -seed=1 -max_total_time="$seconds" -timeout=2 -verbosity=0 >"$log" 2>&1; then
    cat "$log" >&2
    exit 1
  fi
  echo "fuzz smoke passed: $target (${seconds}s)"
done
'''

[tasks.test-release-core]
private = true
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "cli", "release_fixture"]

[tasks.test-release-lsp]
private = true
command = "cargo"
args = ["test", "-p", "adocweave-lsp", "release_fixture"]

[tasks.test-release]
description = "Run the cross-component initial release fixture tests"
dependencies = ["test-release-core", "test-release-lsp"]

[tasks.test-profile-release]
description = "Run versioned core-profile and cross-runtime release contracts"
dependencies = ["test-release", "test-cross-runtime"]
command = "cargo"
args = ["test", "-p", "adocweave-wasm", "--test", "conformance"]

[tasks.check-zed]
description = "Type-check the excluded Zed extension crate"
command = "cargo"
args = ["check", "--manifest-path", "editors/zed/Cargo.toml"]

[tasks.clippy-zed]
description = "Run Clippy for the excluded Zed extension crate"
command = "cargo"
args = [
  "clippy",
  "--manifest-path",
  "editors/zed/Cargo.toml",
  "--",
  "-D",
  "warnings",
]

[tasks.run-lsp]
description = "Run the Language Server over standard input/output"
command = "cargo"
args = ["run", "-p", "adocweave-lsp", "--bin", "adocweave-lsp"]

[tasks.doc-check]
description = "Build workspace API documentation without dependencies"
env = { "RUSTDOCFLAGS" = "-D warnings" }
command = "cargo"
args = ["doc", "--workspace", "--all-features", "--no-deps"]

[tasks.docs-check]
description = "Reject .md files"
script_runner = "@shell"
script = '''
unexpected="$(rg --files --hidden -g '*.md' -g '!.git/**' || true)"
if [ -n "$unexpected" ]; then
  echo "repository documentation must use .adoc:" >&2
  echo "$unexpected" >&2
  exit 1
fi
'''

[tasks.build-adoc-check]
private = true
command = "cargo"
args = ["build", "-p", "adocweave", "--bin", "adocweave"]

[tasks.adoc-check]
description = "Check every tracked AsciiDoc file for crashes, losslessness, and valid ranges"
dependencies = ["build-adoc-check", "adoc-invariants"]
script_runner = "@shell"
script = '''
manifest="$(mktemp target/adoc-check.XXXXXX)"
trap 'rm -f "$manifest"' EXIT
git ls-files '*.adoc' | LC_ALL=C sort > "$manifest"
diagnostics_log="target/adoc-check-diagnostics.log"
: > "$diagnostics_log"

documents=0
diagnostics=0
failed=0
while IFS= read -r path; do
  documents=$((documents + 1))
  if output="$(target/debug/adocweave check "$path" 2>&1)"; then
    if [ -n "$output" ]; then
      echo "[$path]" >> "$diagnostics_log"
      echo "$output" >> "$diagnostics_log"
      count="$(printf '%s\n' "$output" | wc -l)"
      diagnostics=$((diagnostics + count))
    fi
  else
    echo "[$path]" >&2
    echo "$output" >&2
    failed=1
  fi
done < "$manifest"

if [ "$failed" -ne 0 ]; then
  echo "adoc-check failed: $documents documents" >&2
  exit 1
fi
echo "adoc-check passed: $documents documents, $diagnostics permissive diagnostics recorded in $diagnostics_log"
'''

[tasks.adoc-invariants]
private = true
command = "cargo"
args = [
  "test",
  "-p",
  "adocweave",
  "--test",
  "repository_governance",
  "tracked_adoc_corpus_is_lossless_and_has_valid_ranges",
]

[tasks.docs-lint]
description = "Reject unexpected diagnostics in normative documents and abnormal fixtures"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "repository_governance"]

[tasks.build]
description = "Build all workspace targets and features"
command = "cargo"
args = ["build", "--workspace", "--all-targets", "--all-features"]

[tasks.verify]
description = "Run every non-mutating validation task"
dependencies = [
  "fmt-check",
  "check",
  "check-wasm",
  "check-zed",
  "clippy",
  "clippy-zed",
  "test",
  "test-web-worker",
  "test-cross-runtime",
  "doc-check",
  "docs-check",
  "adoc-check",
  "docs-lint",
  "build",
]

[tasks.ci]
description = "Run the complete gate plus fuzz target compilation and short exploration"
dependencies = ["verify", "fuzz-check", "fuzz-smoke"]

[tasks.release-check]
description = "Run the publish gate and report release WASM artifact sizes"
dependencies = ["ci", "test-profile-release", "wasm-size"]

[tasks.release-gate]
description = "Canonical alias for the complete publish gate"
alias = "release-check"
