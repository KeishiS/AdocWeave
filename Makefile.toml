[config]
default_to_workspace = false
skip_core_tasks = true

[tasks.default]
alias = "verify"

[tasks.fmt-workspace]
description = "Format workspace Rust source files"
command = "cargo"
args = ["fmt", "--all"]

[tasks.fmt-zed]
description = "Format the excluded Zed extension crate"
command = "cargo"
args = ["fmt", "--manifest-path", "editors/zed/Cargo.toml"]

[tasks.fmt]
description = "Format workspace and Zed extension Rust source files"
dependencies = ["fmt-workspace", "fmt-zed"]

[tasks.format]
description = "Alias for fmt"
alias = "fmt"

[tasks.fmt-check-workspace]
description = "Check workspace Rust formatting without changing files"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.fmt-check-zed]
description = "Check Zed extension formatting without changing files"
command = "cargo"
args = [
  "fmt",
  "--manifest-path",
  "editors/zed/Cargo.toml",
  "--",
  "--check",
]

[tasks.fmt-check]
description = "Check all Rust formatting without changing files"
dependencies = ["fmt-check-workspace", "fmt-check-zed"]

[tasks.format-check]
description = "Alias for fmt-check"
alias = "fmt-check"

[tasks.check]
description = "Type-check all workspace targets and features"
command = "cargo"
args = ["check", "--workspace", "--all-targets", "--all-features"]

[tasks.clippy]
description = "Run Clippy for all workspace targets and features"
command = "cargo"
args = [
  "clippy",
  "--workspace",
  "--all-targets",
  "--all-features",
  "--",
  "-D",
  "warnings",
]

[tasks.test]
description = "Run all workspace tests"
command = "cargo"
args = ["test", "--workspace", "--all-features"]

[tasks.test-core]
description = "Run parser, renderer, lint, formatter, and CLI tests"
command = "cargo"
args = ["test", "-p", "adocweave", "--all-features"]

[tasks.test-lsp]
description = "Run Language Server tests"
command = "cargo"
args = ["test", "-p", "adocweave-lsp", "--all-features"]

[tasks.test-wasm-api]
description = "Run the native WASM API contract tests"
command = "cargo"
args = ["test", "-p", "adocweave-wasm", "--all-features"]

[tasks.test-web-worker]
description = "Run the Web Worker protocol tests"
command = "npm"
args = ["test", "--prefix", "web-worker"]

[tasks.check-wasm]
description = "Type-check the WASM adapter for wasm32-unknown-unknown"
command = "cargo"
args = [
  "check",
  "-p",
  "adocweave-wasm",
  "--target",
  "wasm32-unknown-unknown",
]

[tasks.build-wasm]
description = "Build wasm-bindgen web artifacts under target/adocweave-wasm"
script_runner = "@shell"
script = '''
cargo build -p adocweave-wasm --release --target wasm32-unknown-unknown
wasm-bindgen \
  --target web \
  --out-dir target/adocweave-wasm \
  target/wasm32-unknown-unknown/release/adocweave_wasm.wasm
'''

[tasks.wasm-size]
description = "Build WASM and report generated artifact byte sizes"
dependencies = ["build-wasm"]
script_runner = "@shell"
script = '''
for artifact in target/adocweave-wasm/*; do
  bytes="$(wc -c < "$artifact")"
  echo "$bytes $artifact"
done
'''

[tasks.test-grammar]
description = "Run normative grammar and substitution contract tests"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "grammar"]

[tasks.test-properties]
description = "Run parser and formatter invariant tests"
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "properties"]

[tasks.test-release-core]
private = true
command = "cargo"
args = ["test", "-p", "adocweave", "--test", "cli", "release_fixture"]

[tasks.test-release-lsp]
private = true
command = "cargo"
args = ["test", "-p", "adocweave-lsp", "release_fixture"]

[tasks.test-release]
description = "Run the cross-component initial release fixture tests"
dependencies = ["test-release-core", "test-release-lsp"]

[tasks.check-zed]
description = "Type-check the excluded Zed extension crate"
command = "cargo"
args = ["check", "--manifest-path", "editors/zed/Cargo.toml"]

[tasks.clippy-zed]
description = "Run Clippy for the excluded Zed extension crate"
command = "cargo"
args = [
  "clippy",
  "--manifest-path",
  "editors/zed/Cargo.toml",
  "--",
  "-D",
  "warnings",
]

[tasks.run-lsp]
description = "Run the Language Server over standard input/output"
command = "cargo"
args = ["run", "-p", "adocweave-lsp", "--bin", "adocweave-lsp"]

[tasks.doc-check]
description = "Build workspace API documentation without dependencies"
env = { "RUSTDOCFLAGS" = "-D warnings" }
command = "cargo"
args = ["doc", "--workspace", "--all-features", "--no-deps"]

[tasks.docs-check]
description = "Reject .md files"
script_runner = "@shell"
script = '''
unexpected="$(rg --files --hidden -g '*.md' -g '!.git/**' || true)"
if [ -n "$unexpected" ]; then
  echo "repository documentation must use .adoc:" >&2
  echo "$unexpected" >&2
  exit 1
fi
'''

[tasks.build]
description = "Build all workspace targets and features"
command = "cargo"
args = ["build", "--workspace", "--all-targets", "--all-features"]

[tasks.verify]
description = "Run every non-mutating validation task"
dependencies = [
  "fmt-check",
  "check",
  "check-wasm",
  "check-zed",
  "clippy",
  "clippy-zed",
  "test",
  "test-web-worker",
  "doc-check",
  "docs-check",
  "build",
]

[tasks.ci]
description = "Alias for the complete verification gate"
alias = "verify"
