name: Release contract

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Run the complete release gate for tags
        if: github.event_name == 'push'
        run: nix develop -c cargo make release-gate
      - name: Verify PR release contract
        if: github.event_name == 'pull_request'
        run: nix develop -c cargo make release-ci-contract
      - name: Verify tag and release train
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node tools/release-contract.mjs "--tag=$RELEASE_TAG"
