name: Quality gate

on:
  workflow_call:
    inputs:
      run_nix_package:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  dependencies:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Audit dependency boundaries
        run: nix develop .#ci -c cargo make dependency-governance

  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Run the source quality gate
        run: nix develop .#ci -c cargo make quality

  fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Compile and explore fuzz targets
        run: nix develop .#ci -c cargo make fuzz

  nix-package:
    if: inputs.run_nix_package
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Build and run the Nix package
        run: nix develop .#ci -c cargo make nix-package-check
