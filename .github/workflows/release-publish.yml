name: Release publish

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: github-release
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-candidate
          path: artifacts
      - name: Verify immutable release inputs
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ inputs.plan }}
        run: |
          tag="$(jq -r '.announcement_tag' <<<"$PLAN")"
          test -n "$tag"
          test "$tag" = "$GITHUB_REF_NAME"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git diff --exit-code
          git diff --cached --exit-code
          node tools/release-contract.mjs "--tag=$tag"
          node tools/release-metadata.mjs verify artifacts "$GITHUB_SHA"
          error="$(mktemp)"
          if gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" >/dev/null 2>"$error"; then
            echo "release already exists: $tag" >&2
            exit 1
          fi
          if ! grep -q 'HTTP 404' "$error"; then
            cat "$error" >&2
            exit 1
          fi
      - name: Create and verify private draft
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ inputs.plan }}
        run: |
          tag="$(jq -r '.announcement_tag' <<<"$PLAN")"
          title="$(jq -r '.announcement_title' <<<"$PLAN")"
          body="$(jq -r '.announcement_github_body' <<<"$PLAN")"
          prerelease="$(jq -r '.announcement_is_prerelease' <<<"$PLAN")"
          printf '%s\n' "$body" > "$RUNNER_TEMP/release-notes.txt"
          args=(--draft --target "$GITHUB_SHA" --title "$title" --notes-file "$RUNNER_TEMP/release-notes.txt")
          if [ "$prerelease" = true ]; then args+=(--prerelease); fi
          gh release create "$tag" "${args[@]}"
          gh release upload "$tag" artifacts/*
          expected="$(find artifacts -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)"
          actual="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq '.assets[].name' | LC_ALL=C sort)"
          test "$actual" = "$expected"
      - name: Attest every public asset
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: artifacts/*
      - name: Publish the complete release
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ inputs.plan }}
        run: |
          tag="$(jq -r '.announcement_tag' <<<"$PLAN")"
          gh release edit "$tag" --draft=false
      - name: Remove an incomplete draft
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ inputs.plan }}
        run: |
          tag="$(jq -r '.announcement_tag' <<<"$PLAN")"
          if gh release view "$tag" --json isDraft --jq '.isDraft' | grep -qx true; then
            gh release delete "$tag" --yes
          fi
