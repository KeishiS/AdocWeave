name: Release publish

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: github-release
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-candidate
          path: artifacts
      - name: Verify immutable release inputs
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ inputs.plan }}
        run: |
          tag="$(jq -r '.announcement_tag' <<<"$PLAN")"
          test -n "$tag"
          test "$tag" = "$GITHUB_REF_NAME"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git diff --exit-code
          git diff --cached --exit-code
          node tools/release-contract.mjs "--tag=$tag"
          node tools/release-metadata.mjs verify artifacts "$GITHUB_SHA"
          releases="$(gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/releases?per_page=100")"
          existing="$(jq --arg tag "$tag" -r '.[][] | select(.tag_name == $tag) | .id' <<<"$releases")"
          if [ -n "$existing" ]; then
            echo "release already exists: $tag" >&2
            exit 1
          fi
      - name: Create and verify private draft
        id: draft
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ inputs.plan }}
        run: |
          tag="$(jq -r '.announcement_tag' <<<"$PLAN")"
          title="$(jq -r '.announcement_title' <<<"$PLAN")"
          body="$(jq -r '.announcement_github_body' <<<"$PLAN")"
          body="$(node tools/release-notes.mjs "$tag" <<<"$body")"
          prerelease="$(jq -r '.announcement_is_prerelease' <<<"$PLAN")"
          draft="$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
            -f tag_name="$tag" \
            -f target_commitish="$GITHUB_SHA" \
            -f name="$title" \
            -f body="$body" \
            -F draft=true \
            -F prerelease="$prerelease")"
          release_id="$(jq -r '.id' <<<"$draft")"
          upload_url="$(jq -r '.upload_url' <<<"$draft")"
          upload_url="${upload_url%%\{*}"
          test "$release_id" != null
          test -n "$upload_url"
          echo "release-id=$release_id" >> "$GITHUB_OUTPUT"
          for file in artifacts/*; do
            name="${file##*/}"
            gh api --method POST \
              --header 'Content-Type: application/octet-stream' \
              --input "$file" \
              "$upload_url?name=$name" >/dev/null
          done
          draft="$(gh api "repos/$GITHUB_REPOSITORY/releases/$release_id")"
          expected="$(find artifacts -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)"
          actual="$(jq -r '.assets[].name' <<<"$draft" | LC_ALL=C sort)"
          if [ "$actual" != "$expected" ]; then
            echo "draft release asset set mismatch" >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual")
            exit 1
          fi
      - name: Attest every public asset
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: artifacts/*
      - name: Publish the complete release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ steps.draft.outputs.release-id }}
        run: |
          result="$(gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -F draft=false)"
          test "$(jq -r '.draft' <<<"$result")" = false
      - name: Remove an incomplete draft
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ inputs.plan }}
          RELEASE_ID: ${{ steps.draft.outputs.release-id }}
        run: |
          tag="$(jq -r '.announcement_tag' <<<"$PLAN")"
          if [ -n "$RELEASE_ID" ]; then
            draft="$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" 2>/dev/null || true)"
            if [ "$(jq -r '.draft // false' <<<"${draft:-{}}")" = true ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID"
            fi
          else
            releases="$(gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/releases?per_page=100")"
            jq --arg tag "$tag" -r '.[][] | select(.tag_name == $tag and .draft == true) | .id' <<<"$releases" |
              while IFS= read -r release_id; do
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$release_id"
              done
          fi
