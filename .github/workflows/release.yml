name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-24.04
    outputs:
      manifest: ${{ steps.plan.outputs.manifest }}
      tag: ${{ steps.plan.outputs.tag }}
      publishing: ${{ steps.plan.outputs.publishing }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Install pinned dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh
      - id: plan
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
        run: |
          if [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            candidate_tag="$RELEASE_TAG"
            publishing=true
          else
            candidate_tag="v$(jq -r .packageVersion release-manifest.json)"
            publishing=false
          fi
          dist plan --tag="$candidate_tag" --output-format=json > plan.json
          {
            echo "manifest=$(jq -c . plan.json)"
            echo "tag=$candidate_tag"
            echo "publishing=$publishing"
          } >> "$GITHUB_OUTPUT"

  release-contract:
    uses: ./.github/workflows/release-contract.yml

  build-native:
    needs: [plan, release-contract]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Install native build tools and pinned dist
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
          rustup target add "${{ matrix.target }}"
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.32.0/cargo-dist-installer.sh | sh
      - name: Build target archives
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          args=()
          if [ -n "$RELEASE_TAG" ]; then args+=("--tag=$RELEASE_TAG"); fi
          dist build "${args[@]}" --artifacts=local --target="${{ matrix.target }}" --output-format=json > dist-manifest.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-local-${{ matrix.target }}
          if-no-files-found: error
          path: |
            target/distrib/adocweave-cli-${{ matrix.target }}.tar.xz
            target/distrib/adocweave-lsp-${{ matrix.target }}.tar.xz

  native-smoke:
    needs: [plan, build-native]
    uses: ./.github/workflows/native-artifact-smoke.yml
    with:
      plan: ${{ needs.plan.outputs.manifest }}

  build-global:
    needs: [plan, release-contract]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - name: Build browser and Zed archives
        run: |
          bash tools/package-browser-release.sh
          bash tools/package-zed-release.sh
          version="$(jq -r .packageVersion release-manifest.json)"
          for archive in \
            "target/distrib/adocweave-browser-$version.tar.xz" \
            "target/distrib/adocweave-zed-$version.tar.xz"; do
            test -s "$archive"
            tar -tJf "$archive" >/dev/null
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-global
          if-no-files-found: error
          path: |
            target/distrib/adocweave-browser-*.tar.xz
            target/distrib/adocweave-zed-*.tar.xz

  verify-candidate:
    needs: [plan, native-smoke, build-global]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-build-*
          path: artifacts
          merge-multiple: true
      - name: Generate and verify metadata for the complete candidate
        run: |
          node tools/release-metadata.mjs generate artifacts "$GITHUB_SHA"
          node tools/release-metadata.mjs verify artifacts "$GITHUB_SHA"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-candidate
          if-no-files-found: error
          path: artifacts/*

  installation-e2e:
    needs: [verify-candidate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-candidate
          path: artifacts
      - name: Install and completely remove the candidate
        run: node tools/release-installation-e2e.mjs artifacts "${{ matrix.target }}"

  publish:
    if: needs.plan.outputs.publishing == 'true'
    needs: [plan, verify-candidate, installation-e2e]
    uses: ./.github/workflows/release-publish.yml
    with:
      plan: ${{ needs.plan.outputs.manifest }}
    permissions:
      attestations: write
      contents: write
      id-token: write
