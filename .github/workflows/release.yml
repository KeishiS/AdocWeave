name: CI and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

permissions:
  contents: read

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  plan:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      manifest: ${{ steps.plan.outputs.manifest }}
      tag: ${{ steps.plan.outputs.tag }}
      publishing: ${{ steps.plan.outputs.publishing }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify publication tag is the current main commit
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main:refs/remotes/origin/main
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - id: plan
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || '' }}
        run: |
          if [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
            candidate_tag="$RELEASE_TAG"
            publishing=true
          else
            candidate_tag="v$(jq -r .packageVersion release-manifest.json)"
            publishing=false
          fi
          tools/run-pinned-dist.sh plan --tag="$candidate_tag" --output-format=json > plan.json
          {
            echo "manifest=$(jq -c . plan.json)"
            echo "tag=$candidate_tag"
            echo "publishing=$publishing"
          } >> "$GITHUB_OUTPUT"

  quality:
    uses: ./.github/workflows/quality.yml
    with:
      release_tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
      run_nix_package: ${{ github.event_name == 'pull_request' }}

  build-native:
    if: github.event_name == 'push'
    needs: [plan]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Install native build tools and pinned dist
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools
          rustup target add "${{ matrix.target }}"
      - name: Build target archives
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          args=()
          if [ -n "$RELEASE_TAG" ]; then args+=("--tag=$RELEASE_TAG"); fi
          tools/run-pinned-dist.sh build "${args[@]}" --artifacts=local --target="${{ matrix.target }}" --output-format=json > dist-manifest.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-local-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 7
          path: |
            target/distrib/adocweave-cli-${{ matrix.target }}.tar.xz
            target/distrib/adocweave-lsp-${{ matrix.target }}.tar.xz

  native-smoke:
    if: github.event_name == 'push'
    needs: [plan, build-native]
    uses: ./.github/workflows/native-artifact-smoke.yml
    with:
      plan: ${{ needs.plan.outputs.manifest }}

  build-global:
    if: github.event_name == 'push'
    needs: [plan]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Build and verify browser and Zed archives
        run: nix develop .#ci -c cargo make release-global-artifacts
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-build-global
          if-no-files-found: error
          retention-days: 7
          path: |
            target/distrib/adocweave-browser-*.tar.xz
            target/distrib/adocweave-zed-*.tar.xz

  verify-candidate:
    if: github.event_name == 'push'
    needs: [plan, native-smoke, build-global]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: artifacts-build-*
          path: artifacts
          merge-multiple: true
      - name: Generate and verify metadata for the complete candidate
        run: |
          node tools/release-metadata.mjs generate artifacts "$GITHUB_SHA"
          node tools/release-metadata.mjs verify artifacts "$GITHUB_SHA"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-candidate
          if-no-files-found: error
          retention-days: 14
          path: artifacts/*

  installation-e2e:
    if: github.event_name == 'push'
    needs: [verify-candidate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            nix-system: aarch64-linux
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
            nix-system: x86_64-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
        with:
          determinate: false
      - name: Build and run the Nix package
        run: >-
          nix build
          ".#checks.${{ matrix.nix-system }}.public-contract"
          ".#checks.${{ matrix.nix-system }}.package-smoke"
          ".#checks.${{ matrix.nix-system }}.nixos-package-evaluation"
          --no-link
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-candidate
          path: artifacts
      - name: Install and completely remove the candidate
        run: node tools/release-installation-e2e.mjs artifacts "${{ matrix.target }}"

  publish:
    if: needs.plan.outputs.publishing == 'true'
    needs: [plan, quality, verify-candidate, installation-e2e]
    uses: ./.github/workflows/release-publish.yml
    with:
      plan: ${{ needs.plan.outputs.manifest }}
    permissions:
      attestations: write
      contents: write
      id-token: write
