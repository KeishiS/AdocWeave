[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
allow-dirty = ["ci"]
# A single repository-owned checksum list is the public contract.
checksum = "false"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl"]
# Where to host releases
hosting = "github"
packages = ["adocweave-cli", "adocweave-lsp"]
# Which actions to run on pull requests
pr-run-mode = "plan"
# Plan jobs to run in CI
plan-jobs = ["./release-contract"]
# Run native archive smoke tests after target builds
global-artifacts-jobs = ["./native-artifact-smoke"]
# Generate and dist a source tarball
source-tarball = false
include = ["THIRD_PARTY_NOTICES.adoc"]

[[dist.extra-artifacts]]
artifacts = ["target/distrib/adocweave-browser-0.1.0-rc.3.tar.xz"]
build = ["bash", "tools/package-browser-release.sh"]

[[dist.extra-artifacts]]
artifacts = ["target/distrib/adocweave-zed-0.1.0-rc.3.tar.xz"]
build = ["bash", "tools/package-zed-release.sh"]

[dist.github-custom-runners]
global = "ubuntu-24.04"
aarch64-unknown-linux-musl = "ubuntu-24.04-arm"
x86_64-unknown-linux-musl = "ubuntu-24.04"
